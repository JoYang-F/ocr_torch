# ============================================================
# OCR 推理部署配置
# ============================================================
# 使用方式：
#   python inference.py -c config.yml                # 使用下方 input 指定的路径
#   python inference.py -c config.yml -i ./my_imgs/  # CLI 参数覆盖配置
#   python det_inference.py -c config.yml            # 仅检测
#   python rec_inference.py -c config.yml            # 仅识别

# --- 输入 ---
input:
  # 图像目录或单张图像路径（也可通过 CLI: -i <path> 覆盖）
  # 注意：部署前必须修改为实际路径！
  image_dir_or_path: ""
  mode: full                                        # full / det_only / rec_only

# --- 文本检测模型 ---
det:
  model_path: ./models/DBNet.onnx                   # ONNX 检测模型路径
  long_size: 960                                     # 推理时图片长边尺寸
  thresh: 0.3                                        # 概率图二值化阈值
  box_thresh: 0.6                                    # 文本框置信度阈值
  max_candidates: 1000                               # 最大候选框数
  unclip_ratio: 1.6                                  # 文本框膨胀比例

# --- 文本识别模型 ---
rec:
  model_path: ./models/CRNN.onnx                     # ONNX 识别模型路径
  char_json_path: ./models/num_chars_38.json         # 字符映射表
  image_shape: [3, 32, 320]                          # 识别输入尺寸 [C, H, max_W]

# --- 结果输出 ---
result:
  save_dir: ./results                                # 结果保存目录
  visualize: true                                    # 是否保存可视化图像

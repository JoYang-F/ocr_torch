global:
  yml_type: DET
  use_gpu: false
  epochs: 200
  eval_epoch: 10
  save_pth_dir: ./output/model_det/
  init_pth_path:   # 初始化模型地址
  log_iter: 10
  save_epoch_iter: 10

logger:
  name: detection
  level: INFO

Architecture:
  model_type: det
  algorithm: DBNet
  Backbone:
    name: det_mobilenet_v3
    pre_trained_dir:
    multiplier: 0.5
    use_se: false
    # name: resnet34
    # pre_trained_dir:
  Neck:
    name: DBFPN
    inner_channel: 96
  Head:
    name: DBHead
    k: 50

optimizer:
  name: OptimizerScheduler
  optim_method: _adam
  init_learning_rate: 0.001
  learning_schedule:
    name: LearningSchedule
    lr_method: _cosine_warmup
    warmup_epoch: 2
    
loss:
  name: L1BalanceCELoss
  eps: 0.000001
  l1_scale: 10
  bce_scale: 5
  negative_ratio: 3.0

post_process:
  name: DBPostProcess
  thresh: 0.3
  box_thresh: 0.6
  max_candidates: 1000
  unclip_ratio: 1.6

metrics:
  name: DetMetric
  main_indicator: hmean

train:
  dataset:
    name: DetDataSet
    data_base_dir: ./data_loader/det/
    ano_file_path: ./data_loader/det/train.txt
    do_shuffle: true
    transforms:
      - IaaAugment:
          flip_prob: 0.5
          affine_rotate: [-5, 5]
          resize_scale: [0.5, 1.5]
      - RandomCropData:
          size: [640, 640]
          max_tries: 10
          min_crop_side_ratio: 0.1
          keep_ratio: true
      - MakeBorderMap:
          shrink_ratio: 0.4
          thresh_min: 0.3
          thresh_max: 0.7
      - MakeProbMap:
          min_text_size: 4
          shrink_ratio: 0.4
      - NormalizeImage:
      - OutputData:
          keep_keys: ['image', 'thresh_map', 'thresh_mask', 'prob_map', 'prob_mask']
  dataloader:
    batch_size: 2
    num_workers: 0
    drop_last: true
    pin_memory: true

validate:
  dataset:
    name: DetDataSet
    data_base_dir: ./data_loader/det/
    ano_file_path: ./data_loader/det/val.txt
    do_shuffle: false
    transforms:
      - ResizeForTest:
          long_size: 960
      - NormalizeImage:
      - OutputData:
          keep_keys: ['image', 'src_scale', 'polys', 'ignore_tags']
  dataloader:
    batch_size: 1
    num_workers: 0
    drop_last: false
    pin_memory: false
